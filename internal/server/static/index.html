<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workload Capacity Sheet</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>&#128203; Workload Capacity Sheet</h1>
    </header>

    <main>
      <!-- ── Left panel: file selector + entry form ── -->
      <section class="panel panel--left">
        <div class="file-selector">
          <label for="filePath">Excel file path</label>
          <div class="file-row">
            <input
              id="filePath"
              type="text"
              placeholder="/path/to/workload.xlsx"
              autocomplete="off"
            />
            <button id="loadBtn" class="btn btn--primary">Load</button>
          </div>
          <p id="fileStatus" class="status"></p>
        </div>

        <hr />

        <form id="entryForm" novalidate>
          <h2 id="formTitle">Add Entry</h2>

          <div class="form-grid">
            <label for="project">Project</label>
            <input id="project" type="text" required placeholder="e.g. MyProject" />

            <label for="swtb">SwTB</label>
            <input id="swtb" type="text" required placeholder="e.g. TB1" />

            <label for="version">Version</label>
            <input id="version" type="text" placeholder="e.g. 1.0.0" />

            <label for="week">Week</label>
            <input id="week" type="number" min="1" max="53" placeholder="1&#x2013;53" />

            <label for="type">Type</label>
            <select id="type">
              <option value="">&#x2014; select &#x2014;</option>
              <option>Dev</option>
              <option>Test</option>
              <option>PM</option>
              <option>Design</option>
              <option>Support</option>
              <option>Other</option>
            </select>

            <label for="resources">#Ressources</label>
            <input id="resources" type="number" min="0" step="0.5" placeholder="e.g. 2" />

            <label for="year">Year</label>
            <input id="year" type="number" min="2000" max="2100" placeholder="e.g. 2026" />

            <label for="quarter">Quarter</label>
            <select id="quarter">
              <option value="">&#x2014; select &#x2014;</option>
              <option>Q1</option>
              <option>Q2</option>
              <option>Q3</option>
              <option>Q4</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="submit" id="saveBtn" class="btn btn--primary" disabled>
              Save
            </button>
            <button type="button" id="cancelBtn" class="btn btn--secondary" style="display:none">
              Cancel
            </button>
          </div>
          <p id="formStatus" class="status"></p>
        </form>
      </section>

      <!-- ── Right panel: data preview ── -->
      <section class="panel panel--right">
        <div class="preview-header">
          <h2>Preview</h2>
          <span id="rowCount" class="badge">0 rows</span>
        </div>
        <div class="table-wrapper">
          <table id="previewTable">
            <thead>
              <tr>
                <th>Project</th>
                <th>SwTB</th>
                <th>Version</th>
                <th>Week</th>
                <th>Type</th>
                <th>#Ressources</th>
                <th>Year</th>
                <th>Quarter</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="previewBody">
              <tr id="emptyRow">
                <td colspan="9" class="empty">No file loaded yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
